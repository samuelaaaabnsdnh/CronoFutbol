<!doctype html>

<html class="dark" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Registro - CronoFútbol Elite</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono:wght@500&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              outline: "#89938d",
              "on-primary-container": "#80bea6",
              "on-secondary": "#402d00",
              "on-secondary-fixed-variant": "#5c4300",
              "secondary-fixed": "#ffdf9f",
              "on-primary-fixed-variant": "#0b513d",
              "on-tertiary": "#53211b",
              "inverse-on-surface": "#313030",
              "surface-container-low": "#1c1b1b",
              "on-tertiary-fixed-variant": "#6e372f",
              "on-primary-fixed": "#002117",
              "error-container": "#93000a",
              "primary-fixed": "#b0f0d6",
              "on-primary": "#003829",
              "surface-dim": "#131313",
              secondary: "#ffc640",
              "on-surface-variant": "#bfc9c3",
              "on-secondary-fixed": "#261a00",
              "on-secondary-container": "#5a4100",
              "surface-container": "#201f1f",
              "on-background": "#e5e2e1",
              "secondary-container": "#e3aa00",
              "tertiary-fixed": "#ffdad5",
              "primary-container": "#064e3b",
              "outline-variant": "#404944",
              surface: "#131313",
              error: "#ffb4ab",
              tertiary: "#ffb4a9",
              "inverse-surface": "#e5e2e1",
              "tertiary-fixed-dim": "#ffb4a9",
              "secondary-fixed-dim": "#f9bd22",
              "tertiary-container": "#6b342d",
              "surface-container-lowest": "#0e0e0e",
              "primary-fixed-dim": "#95d3ba",
              "on-error": "#690005",
              "inverse-primary": "#2b6954",
              "surface-container-high": "#2a2a2a",
              background: "#131313",
              "surface-container-highest": "#353534",
              "on-surface": "#e5e2e1",
              primary: "#95d3ba",
              "surface-variant": "#353534",
              "surface-bright": "#3a3939",
              "surface-tint": "#95d3ba",
              "on-tertiary-container": "#ea9e93",
              "on-tertiary-fixed": "#380d08",
              "on-error-container": "#ffdad6",
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
            fontFamily: {
              headline: ["Sora"],
              display: ["Sora"],
              body: ["Inter"],
              label: ["Jetbrains Mono"],
            },
          },
        },
      };
    </script>
    <style>
      @keyframes pulse-gold {
        0%,
        100% {
          box-shadow: 0 0 0 0 rgba(255, 198, 64, 0.4);
          transform: scale(1);
        }
        50% {
          box-shadow: 0 0 20px 10px rgba(255, 198, 64, 0);
          transform: scale(1.02);
        }
      }
      .animate-pulse-gold {
        animation: pulse-gold 3s infinite ease-in-out;
      }
      .glass-panel {
        background: rgba(19, 19, 19, 0.7);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(149, 211, 186, 0.2);
      }
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .stadium-overlay {
        background: radial-gradient(
          circle at center,
          transparent 0%,
          rgba(19, 19, 19, 0.9) 100%
        );
      }
    </style>
  </head>
  <body
    class="bg-surface font-body text-on-surface min-h-screen relative overflow-x-hidden selection:bg-primary selection:text-on-primary"
  >
    <!-- Background Layer -->
    <div class="fixed inset-0 z-0">
      <div
        class="absolute inset-0 bg-cover bg-center stadium-overlay"
        style="
          background-image: url(&quot;https://lh3.googleusercontent.com/aida/AP1WRLsNIrx4swbd1XFwYFt9PLVUfotD3Uox7sIGJXAYWrtE0po391rMffboTecyTx_6va-V0-F-5s85mMADiv9Nqo-EF9knqxkzdx5iO145uDJFewP9mKYWoTIn_btRIPGgftRju1IfiFcD3Ki3e8_9nmjNGSI9WxzfOfCeBphZy5vMf46PHSrnl9TyLXpXXdy4sa5Twbz0piISj2FeuhAFAniBcT_MCxjX_VZDIszOyZtFdJT4NXdZp6B2A61T&quot;);
        "
      ></div>
    </div>
    <!-- Main Content Container -->
    <main
      class="relative z-10 min-h-screen flex items-center justify-center px-4 py-12 md:py-20"
    >
      <!-- Registration Card -->
      <div
        class="glass-panel w-full max-w-xl p-8 md:p-12 rounded-xl shadow-2xl relative overflow-hidden"
      >
        <!-- Glowing Emerald Border accents -->
        <div
          class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-60"
        ></div>
        <div
          class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary to-transparent opacity-60"
        ></div>
        <!-- Header Section -->
        <div class="text-center mb-10">
          <h1
            class="font-headline font-extrabold text-4xl md:text-5xl tracking-tighter text-primary mb-2"
          >
            CronoFútbol Elite
          </h1>
          <p
            class="font-label text-label-md text-secondary tracking-widest uppercase mb-6"
          >
            Manejo de Gestión Pro
          </p>
          <h2
            class="font-headline font-bold text-2xl md:text-3xl text-on-surface"
          >
            Crear Nueva Cuenta
          </h2>
          <div class="w-16 h-1 bg-secondary mx-auto mt-4 rounded-full"></div>
        </div>
        <!-- Form -->
        <form class="space-y-6" action="dasboard.html"  >
            
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Nombre -->
            <div class="space-y-2">
              <label
                class="font-label text-label-sm text-on-surface-variant ml-1"
                for="first_name"
                >Nombre</label
              >
              <div class="relative group">
                <span
                  class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary text-xl"
                  >person</span
                >
                <input
                  class="w-full bg-surface-container border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg pl-10 pr-4 py-3 text-on-surface placeholder:text-outline transition-all"
                  id="first_name"
                  placeholder="Juan"
                  type="text"
                />
              </div>
            </div>
            <!-- Apellido -->
            <div class="space-y-2">
              <label
                class="font-label text-label-sm text-on-surface-variant ml-1"
                for="last_name"
                >Apellido</label
              >
              <div class="relative group">
                <span
                  class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary text-xl"
                  >badge</span
                >
                <input
                  class="w-full bg-surface-container border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg pl-10 pr-4 py-3 text-on-surface placeholder:text-outline transition-all"
                  id="last_name"
                  placeholder="Pérez"
                  type="text"
                />
              </div>
            </div>
          </div>
          <!-- Correo Electrónico -->
          <div class="space-y-2">
            <label
              class="font-label text-label-sm text-on-surface-variant ml-1"
              for="email"
              >Correo Electrónico</label
            >
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary text-xl"
                >mail</span
              >
              <input
                class="w-full bg-surface-container border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg pl-10 pr-4 py-3 text-on-surface placeholder:text-outline transition-all"
                id="email"
                placeholder="juan.perez@elite.com"
                type="email"
              />
            </div>
          </div>
          <!-- Rol selection as visual tiles -->
          <div class="space-y-3">
            <label class="font-label text-label-sm text-on-surface-variant ml-1"
              >Selecciona tu Rol</label
            >
            <div class="grid grid-cols-3 gap-3">
              <button
                class="group flex flex-col items-center justify-center p-3 rounded-lg border border-outline-variant bg-surface-container-high hover:border-primary transition-all active:scale-95"
                type="button"
              >
                <span class="material-symbols-outlined text-role-coach mb-1"
                  >sports</span
                >
                <span
                  class="font-label text-[10px] uppercase text-on-surface-variant group-hover:text-primary"
                  >Entrenador</span
                >
              </button>
              <button
                class="group flex flex-col items-center justify-center p-3 rounded-lg border border-primary bg-primary-container/20 hover:border-primary transition-all active:scale-95"
                type="button"
              >
                <span class="material-symbols-outlined text-role-admin mb-1"
                  >admin_panel_settings</span
                >
                <span class="font-label text-[10px] uppercase text-primary"
                  >Admin</span
                >
              </button>
              <button
                class="group flex flex-col items-center justify-center p-3 rounded-lg border border-outline-variant bg-surface-container-high hover:border-primary transition-all active:scale-95"
                type="button"
              >
                <span class="material-symbols-outlined text-role-referee mb-1"
                  >sports_cricket</span
                >
                <span
                  class="font-label text-[10px] uppercase text-on-surface-variant group-hover:text-primary"
                  >Árbitro</span
                >
              </button>
            </div>
          </div>
          <!-- Password -->
          <div class="space-y-2">
            <label
              class="font-label text-label-sm text-on-surface-variant ml-1"
              for="password"
              >Contraseña</label
            >
            <div class="relative group">
              <span
                class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary text-xl"
                >lock</span
              >
              <input
                class="w-full bg-surface-container border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary rounded-lg pl-10 pr-12 py-3 text-on-surface placeholder:text-outline transition-all"
                id="password"
                placeholder="••••••••"
                type="password"
              />
              <button
                class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors"
                type="button"
              >
                <span class="material-symbols-outlined">visibility</span>
              </button>
            </div>
          </div>
          <!-- Terms -->
          <div class="flex items-start gap-3 px-1 py-2">
            <input
              class="mt-1 rounded border-outline-variant bg-surface-container text-primary focus:ring-primary h-4 w-4"
              id="terms"
              type="checkbox"
            />
            <label
              class="font-body text-body-sm text-on-surface-variant"
              for="terms"
            >
              Acepto los
              <span class="text-primary hover:underline cursor-pointer"
                >términos y condiciones</span
              >
              y la política de privacidad de CronoFútbol Elite.
            </label>
          </div>
          <!-- CTA Button -->
          <div class="pt-4">
            <button
              class="w-full py-4 bg-secondary text-on-secondary font-headline font-bold text-lg rounded-lg shadow-lg hover:bg-secondary-container transition-all active:scale-95 animate-pulse-gold flex items-center justify-center gap-2"
            >
              <span>CREAR CUENTA</span>
              <span class="material-symbols-outlined font-bold"
                >arrow_forward</span
              >
            </button>
          </div>
        </form>
        <!-- Footer Links -->
        <div class="mt-8 pt-8 border-t border-outline-variant/30 text-center">
          <p class="font-body text-body-md text-on-surface-variant">
            ¿Ya tienes una cuenta?
            <a
              class="text-secondary font-semibold hover:underline ml-1"
              href="#"
              >Inicia Sesión</a
            >
          </p>
        </div>
      </div>
      <!-- Float Decoration Elements -->
      <div
        class="absolute top-10 right-10 hidden xl:block animate-bounce opacity-20"
      >
        <span
          class="material-symbols-outlined text-8xl text-primary"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >sports_soccer</span
        >
      </div>
      <div
        class="absolute bottom-10 left-10 hidden xl:block animate-pulse opacity-20"
      >
        <span
          class="material-symbols-outlined text-8xl text-secondary"
          style="font-variation-settings: &quot;FILL&quot; 1"
          >timer</span
        >
      </div>
    </main>
    <!-- Micro-interaction Script -->
    <script>
      // Subtle parallax effect on registration card
      document.addEventListener("mousemove", (e) => {
        const card = document.querySelector(".glass-panel");
        const { clientX, clientY } = e;
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;

        const moveX = (clientX - centerX) / 50;
        const moveY = (clientY - centerY) / 50;

        card.style.transform = `translate(${moveX}px, ${moveY}px)`;
      });

      // Input focus glow effect
      const inputs = document.querySelectorAll("input");
      inputs.forEach((input) => {
        input.addEventListener("focus", () => {
          input.parentElement.querySelector(
            ".material-symbols-outlined",
          ).style.filter = "drop-shadow(0 0 5px #95d3ba)";
        });
        input.addEventListener("blur", () => {
          input.parentElement.querySelector(
            ".material-symbols-outlined",
          ).style.filter = "none";
        });
      });
    </script>
  </body>
</html>
